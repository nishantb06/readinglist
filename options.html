<!DOCTYPE html>
<html>
<head>
    <title>Notion Sync Settings</title>
    <link rel="stylesheet" href="style.css">
</head>
<body style="padding: 20px; width: 300px;">
    <h3>Notion Settings</h3>
    <div class="field">
        <label>Integration Secret:</label>
        <input type="password" id="secret" class="input">
    </div>
    <div class="field">
        <label>Database ID:</label>
        <input type="text" id="dbid" class="input">
    </div>
    <button id="save" class="button is-primary">Save Settings</button>
    <p id="status"></p>
    <script src="options.js"></script>
</body>
</html>
